<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f6f9;
    color: #1a1a2e;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #ffffff;
    padding: 24px 40px 36px;
    position: relative;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #a0aec0;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: color 0.15s ease;
  }

  .back-link:hover { color: #ffffff; }

  .header h1 {

    margin-top: 18px;
  }

  .header p {

    margin-top: 6px;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 36px 40px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }

  .card {
    display: flex;
    flex-direction: column;
    background: #ffffff;
    border-radius: 12px;
    padding: 24px;
    text-decoration: none;
    color: inherit;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-left: 4px solid #2b6cb0;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
  }

  .card .icon {
    font-size: 30px;
    margin-bottom: 14px;
  }

  .card h2 {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 8px;
  }

  .card p {
    font-size: 13px;
    color: #718096;
    line-height: 1.5;
  }
