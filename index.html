<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projet Solo — Superviser un Portefeuille de Projets</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .cover {
    text-align: center;
    max-width: 640px;
  }

  .logo {
    max-width: 200px;
    width: 100%;
    height: auto;
    margin-bottom: 40px;
  }

  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.35;
    margin-bottom: 14px;
  }

  .subtitle {
    font-size: 15px;
    color: #a0aec0;
    margin-bottom: 6px;
  }

  .name {
    font-size: 15px;
    font-weight: 600;
    color: #e2e8f0;
    letter-spacing: 0.5px;
    margin-bottom: 44px;
  }

  .cta {
    display: inline-block;
    background: #2b6cb0;
    color: #ffffff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 32px;
    border-radius: 8px;
    transition: background 0.15s ease, transform 0.15s ease;
  }

  .cta:hover {
    background: #2c5282;
    transform: translateY(-2px);
  }
</style>
</head>
<body>

<div class="cover">
  <img class="logo" src="./img/logo-cesi.png" alt="Logo CESI">
  <h1>Projet Solo — Superviser un Portefeuille de Projets</h1>
  <p class="subtitle">Master Manager en Infrastructures et Cybersécurité des SI</p>
  <p class="name">KELLER Arthur</p>
  <a class="cta" href="projets.html">Accéder aux livrables →</a>
</div>

</body>
</html>
